name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: autoapply_test
          POSTGRES_USER: autoapply
          POSTGRES_PASSWORD: autoapply-dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U autoapply -d autoapply_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run API tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql+asyncpg://autoapply:autoapply-dev@localhost:5432/autoapply_test
          REDIS_URL: redis://localhost:6379/0
          JWT_ACCESS_SECRET: test-access
          JWT_REFRESH_SECRET: test-refresh
          PASSWORD_PEPPER: test-pepper
        run: pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm typecheck
      - run: pnpm build:web

