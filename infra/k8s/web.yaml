apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoapply-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autoapply-web
  template:
    metadata:
      labels:
        app: autoapply-web
    spec:
      containers:
        - name: web
          image: autoapply/web:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: autoapply-web
spec:
  selector:
    app: autoapply-web
  ports:
    - port: 3000
      targetPort: 3000

