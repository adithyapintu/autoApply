apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoapply-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: autoapply-api
  template:
    metadata:
      labels:
        app: autoapply-api
    spec:
      containers:
        - name: api
          image: autoapply/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: autoapply-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: autoapply-api
spec:
  selector:
    app: autoapply-api
  ports:
    - port: 8000
      targetPort: 8000

