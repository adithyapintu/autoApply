services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: autoapply
      POSTGRES_USER: autoapply
      POSTGRES_PASSWORD: autoapply-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoapply -d autoapply"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      # Override localhost → container hostname for services inside Docker
      DATABASE_URL: postgresql+asyncpg://autoapply:autoapply-dev@postgres:5432/autoapply
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      # Allow the browser (served from localhost:3000) to call this API
      CORS_ORIGINS: '["http://localhost:3000"]'
    # Run migrations then start the server
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./apps/api:/app
      - fastembed-cache:/root/.cache/fastembed
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://autoapply:autoapply-dev@postgres:5432/autoapply
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CELERY_WORKER: "1"
    command: celery -A app.worker.celery_app worker --loglevel=INFO -Q parsing,discovery,ai,email,notifications,automation
    volumes:
      - ./apps/api:/app
      - fastembed-cache:/root/.cache/fastembed
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./apps/api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://autoapply:autoapply-dev@postgres:5432/autoapply
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CELERY_WORKER: "1"
    command: celery -A app.worker.celery_app beat --loglevel=INFO --scheduler celery.beat:PersistentScheduler
    volumes:
      - ./apps/api:/app
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  fastembed-cache:
